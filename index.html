  <body>
    <div id="root"></div>
    <script>
      // Mock electronAPI for browser preview
      if (!window.electronAPI) {
        window.electronAPI = {
          getSetting: async (key) => ({ success: true, value: localStorage.getItem(key) }),
          setSetting: async (key, value) => { localStorage.setItem(key, value); return { success: true }; },
          dbQuery: async () => ({ success: true, data: [] }),
          dbRun: async () => ({ success: true }),
          listFiles: async () => ({ success: true, items: [] }),
          readFile: async () => ({ success: true, content: '// Web Preview Mode\n// Open a folder to start' }),
          writeFile: async () => ({ success: true }),
          gitStatus: async () => ({ success: true, isRepo: false }),
          onMenuOpenFolder: () => () => {},
          onMenuSave: () => () => {},
          onMenuAskAI: () => () => {},
          onMenuCommandPalette: () => () => {},
          minimize: async () => {},
          maximize: async () => {},
          close: async () => {},
          isMaximized: async () => false,
          getPath: async () => '/mock/path',
          getVersion: async () => '1.0.0-mock'
        };
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
